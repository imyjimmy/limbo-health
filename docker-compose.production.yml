# Production environment overrides
# Extends docker-compose.yml with prod-specific settings
# Use: docker-compose -f docker-compose.yml -f docker-compose.production.yml up

services:
  # Auth API - Nostr & Google OAuth authentication
  auth-api:
    build:
      context: .
      dockerfile: apps/auth-api/Dockerfile
    environment:
      - NODE_ENV=production
      - PORT=3010
      - DATABASE_URL=postgres://${RECORDS_WORKFLOW_DB_USER:-postgres}:${RECORDS_WORKFLOW_DB_PASSWORD:-postgres}@records-workflow-postgres:5432/${RECORDS_WORKFLOW_DB_NAME:-records_workflow}
      - JWT_SECRET=${JWT_SECRET}
      - NOSTR_RELAYS=${NOSTR_RELAYS}
      - GOOGLE_CLIENT_ID=${GOOGLE_CLIENT_ID}
      - GOOGLE_CLIENT_SECRET=${GOOGLE_CLIENT_SECRET}
    ports:
      - "3010:3010"
    networks:
      - limbo-network
    depends_on:
      - records-workflow-postgres
    restart: unless-stopped

  # MGit API - Encrypted medical record repositories
  mgit-api:
    build:
      context: .
      dockerfile: apps/mgit-api/Dockerfile
    environment:
      - NODE_ENV=production
      - PORT=3003
      - REPOS_PATH=/repos
      - JWT_SECRET=${JWT_SECRET}
    volumes:
      - repos-data:/repos
    ports:
      - "3003:3003"
    networks:
      - limbo-network
    restart: unless-stopped

  # Scheduler API - Appointments, billing, WebRTC
  scheduler-api:
    build:
      context: .
      dockerfile: apps/scheduler-api/Dockerfile
    environment:
      - NODE_ENV=production
      - PORT=3005
      - DATABASE_URL=postgres://${RECORDS_WORKFLOW_DB_USER:-postgres}:${RECORDS_WORKFLOW_DB_PASSWORD:-postgres}@records-workflow-postgres:5432/${RECORDS_WORKFLOW_DB_NAME:-records_workflow}
      - JWT_SECRET=${JWT_SECRET}
      - ALBY_CLIENT_ID=${ALBY_CLIENT_ID}
      - ALBY_CLIENT_SECRET=${ALBY_CLIENT_SECRET}
      - GOOGLE_CLIENT_ID=${GOOGLE_CLIENT_ID}
      - GOOGLE_CLIENT_SECRET=${GOOGLE_CLIENT_SECRET}
    ports:
      - "3005:3005"
    networks:
      - limbo-network
    depends_on:
      - records-workflow-postgres
    restart: unless-stopped

  # Records workflow API - Public records crawler and read API
  records-workflow-api:
    build:
      context: .
      dockerfile: apps/records-workflow-api/Dockerfile
    environment:
      - NODE_ENV=production
      - PORT=3020
      - DATABASE_URL=postgres://${RECORDS_WORKFLOW_DB_USER:-postgres}:${RECORDS_WORKFLOW_DB_PASSWORD:-postgres}@records-workflow-postgres:5432/${RECORDS_WORKFLOW_DB_NAME:-records_workflow}
      - RAW_STORAGE_DIR=/app/storage/raw
    ports:
      - "3020:3020"
    networks:
      - limbo-network
    depends_on:
      - records-workflow-postgres
    restart: unless-stopped
    command: npm run start
    volumes:
      - ./apps/records-workflow-api/storage/raw:/app/storage/raw

  # Frontend - React SPA
  frontend:
    build:
      context: .
      dockerfile: apps/frontend/Dockerfile
    ports:
      - "5173:80"
    networks:
      - limbo-network
    restart: unless-stopped

  # Gateway - Nginx reverse proxy
  gateway:
    build:
      context: .
      dockerfile: apps/gateway/Dockerfile
    ports:
      - "80:80"
      - "443:443"
    networks:
      - limbo-network
    depends_on:
      - auth-api
      - mgit-api
      - scheduler-api
      - records-workflow-api
      - frontend
    restart: unless-stopped
    volumes:
      - ./apps/gateway/nginx.conf:/etc/nginx/nginx.conf:ro

  # Records workflow Postgres
  records-workflow-postgres:
    image: postgres:16-alpine
    environment:
      - POSTGRES_DB=${RECORDS_WORKFLOW_DB_NAME:-records_workflow}
      - POSTGRES_USER=${RECORDS_WORKFLOW_DB_USER:-postgres}
      - POSTGRES_PASSWORD=${RECORDS_WORKFLOW_DB_PASSWORD:-postgres}
    volumes:
      - records_workflow_pg_data:/var/lib/postgresql/data
    ports:
      - "5433:5432"
    networks:
      - limbo-network
    restart: unless-stopped

networks:
  limbo-network:
    driver: bridge

volumes:
  repos-data:
    driver: local
  records_workflow_pg_data:
    driver: local
