# Railway Configuration Template
# Generated from the Limbo Health Railway layout

services:
  auth-api:
    dockerfile: apps/auth-api/Dockerfile
    port: 3010
    variables:
      PORT: "3010"
      DATABASE_URL: "${{Postgres.DATABASE_URL}}"
      JWT_SECRET: "<SECRET>"
      NOSTR_RELAYS: "wss://relay.damus.io,wss://relay.primal.net"
      GOOGLE_CLIENT_ID: "<SECRET>"
      GOOGLE_CLIENT_SECRET: "<SECRET>"

  mgit-api:
    dockerfile: apps/mgit-api/Dockerfile
    port: 3003
    variables:
      PORT: "3003"
      REPOS_PATH: "/repos"
      JWT_SECRET: "${{auth-api.JWT_SECRET}}"
    volumes:
      - mount: "/repos"
        name: "mgit-repos"

  scheduler-api:
    dockerfile: apps/scheduler-api/Dockerfile
    port: 3005
    variables:
      PORT: "3005"
      DATABASE_URL: "${{Postgres.DATABASE_URL}}"
      JWT_SECRET: "${{auth-api.JWT_SECRET}}"
      ALBY_CLIENT_ID: "<SECRET>"
      ALBY_CLIENT_SECRET: "<SECRET>"
      GOOGLE_CLIENT_ID: "${{auth-api.GOOGLE_CLIENT_ID}}"
      GOOGLE_CLIENT_SECRET: "${{auth-api.GOOGLE_CLIENT_SECRET}}"

  records-workflow-postgres:
    plugin: postgres
    variables:
      POSTGRES_DB: "records_workflow"

  records-workflow-api:
    dockerfile: apps/records-workflow-api/Dockerfile
    port: 3020
    start_command: "npm run start"
    variables:
      PORT: "3020"
      DATABASE_URL: "${{records-workflow-postgres.DATABASE_URL}}"
      TARGETED_PAGES_STORAGE_DIR: "/app/storage/targeted-pages"
      CAPTURED_FORMS_STORAGE_DIR: "/app/storage/captured-forms"
      ACCEPTED_FORMS_STORAGE_DIR: "/app/storage/accepted-forms"
      HOSPITAL_SUBMISSION_REQUIREMENTS_STORAGE_DIR: "/app/storage/hospital-submission-requirements"
      QUESTION_MAPPING_STORAGE_DIR: "/app/storage/question-mappings"
      PUBLISHED_TEMPLATE_STORAGE_DIR: "/app/storage/published-templates"
      PARSED_STORAGE_DIR: "/app/storage/parsed"
      LEGACY_RAW_STORAGE_DIR: "/app/storage/raw"
      LEGACY_SOURCE_DOCUMENT_STORAGE_DIR: "/app/storage/source-documents"
    volumes:
      - mount: "/app/storage"
        name: "records-workflow-storage"

  MySQL:
    image: mysql:9.4
    port: 3306
    variables:
      MYSQL_ROOT_PASSWORD: "<SECRET>"
      MYSQL_DATABASE: "railway"
      MYSQLUSER: "root"
    volume:
      mount: "/var/lib/mysql"

  gateway:
    dockerfile: apps/gateway/Dockerfile.railway
    port: 80
    variables: {}
    public_domain: "limbo.health"

  frontend:
    dockerfile: apps/frontend/Dockerfile
    port: 80
    variables: {}

networking:
  internal_dns: "*.railway.internal"
  routes:
    - path: "/api/auth"
      upstream: "auth-api:3010"
    - path: "/api/mgit"
      upstream: "mgit-api:3003"
    - path: "/api/records-workflow"
      upstream: "records-workflow-api:3020"
    - path: "/api"
      upstream: "scheduler-api:3005"
    - path: "/"
      upstream: "frontend:80"
