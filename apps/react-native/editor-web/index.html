<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>LimboEditor</title>
    <script>
      window.__applyLimboEditorTheme = function (theme) {
        if (!theme) return;
        const root = document.documentElement;
        const tokens = {
          '--editor-background': theme.background,
          '--editor-text': theme.text,
          '--editor-quote-border': theme.quoteBorder,
          '--editor-quote-text': theme.quoteText,
          '--editor-code-background': theme.codeBackground,
          '--editor-pre-background': theme.preBackground,
          '--editor-selection': theme.selection,
        };
        Object.entries(tokens).forEach(([name, value]) => {
          if (typeof value === 'string' && value.length > 0) {
            root.style.setProperty(name, value);
          }
        });
      };

      const handleThemeMessage = (event) => {
        try {
          const data = typeof event.data === 'string' ? JSON.parse(event.data) : event.data;
          if (data?.type === 'limbo-editor-theme') {
            window.__applyLimboEditorTheme(data.payload);
          }
        } catch (_error) {}
      };

      window.addEventListener('message', handleThemeMessage);
      document.addEventListener('message', handleThemeMessage);
    </script>
  </head>
  <style>
    :root {
      --editor-background: Canvas;
      --editor-text: CanvasText;
      --editor-quote-border: currentColor;
      --editor-quote-text: CanvasText;
      --editor-code-background: transparent;
      --editor-pre-background: transparent;
      --editor-selection: Highlight;
    }
    body {
      margin: 0;
      padding: 0;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: var(--editor-background);
      color: var(--editor-text);
    }
    #root > div:nth-of-type(1) {
      position: absolute;
      height: 100%;
      overflow: auto;
      width: 100%;
      top: 0;
      bottom: 0;
    }
    #root > div.dynamic-height {
      height: unset;
    }
    #root div .ProseMirror {
      min-height: 100%;
      overflow: visible;
      padding: 12px 16px;
      font-size: 16px;
      line-height: 1.6;
      color: var(--editor-text);
      background: var(--editor-background);
    }
    #root div.dynamic-height .ProseMirror {
      height: unset;
    }
    .ProseMirror:focus {
      outline: none;
    }
    .ProseMirror *::selection {
      background: var(--editor-selection);
    }
    .ProseMirror h1, .ProseMirror h2, .ProseMirror h3 {
      margin-top: 0.8em;
      margin-bottom: 0.4em;
    }
    .ProseMirror p {
      margin: 0.4em 0;
    }
    .ProseMirror ul, .ProseMirror ol {
      padding-left: 1.5em;
    }
    .ProseMirror blockquote {
      border-left: 3px solid var(--editor-quote-border);
      padding-left: 1em;
      margin-left: 0;
      color: var(--editor-quote-text);
    }
    .ProseMirror code {
      background: var(--editor-code-background);
      border-radius: 3px;
      padding: 0.15em 0.3em;
      font-size: 0.9em;
    }
    .ProseMirror pre {
      background: var(--editor-pre-background);
      border-radius: 6px;
      padding: 12px;
      overflow-x: auto;
    }
    .ProseMirror pre code {
      background: none;
      padding: 0;
    }
  </style>
  <body>
    <div id="root"></div>
    <script type="module" src="/index.tsx"></script>
  </body>
</html>
