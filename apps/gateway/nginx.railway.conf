# Resolve Railway private hostnames when requests arrive so nginx can start
# even if a backend container is still coming up.
resolver [fd12::10] valid=10s;

server {
  listen 80 default_server;
  server_name _;

  error_log /var/log/nginx/debug.log debug;
  client_max_body_size 100M;

  set $auth_backend auth-api.railway.internal:3010;
  set $mgit_backend mgit-api.railway.internal:3003;
  set $records_workflow_backend records-workflow-api.railway.internal:3020;
  set $plebdoc_backend scheduler-api.railway.internal:3005;
  set $frontend_backend frontend.railway.internal:80;

  proxy_set_header Host $host;
  proxy_set_header X-Real-IP $remote_addr;
  proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
  proxy_set_header X-Forwarded-Proto $scheme;
  proxy_buffering off;
  proxy_http_version 1.1;
  proxy_set_header Connection "";

  location /api/mgit {
    proxy_pass http://$mgit_backend;
  }

  location /api/auth {
    proxy_pass http://$auth_backend;
  }

  location /api/records-workflow {
    proxy_pass http://$records_workflow_backend;
  }

  location /api/webrtc {
    access_log /var/log/nginx/webrtc_access.log;
    error_log /var/log/nginx/webrtc_error.log debug;
    proxy_pass http://$plebdoc_backend;
  }

  location /api/ {
    proxy_pass http://$plebdoc_backend;
  }

  location = /v1 {
    default_type application/json;
    return 410 '{"error":"Records workflow routes moved to /api/records-workflow/*."}';
  }

  location /v1/ {
    default_type application/json;
    return 410 '{"error":"Records workflow routes moved to /api/records-workflow/*."}';
  }

  location / {
    proxy_pass http://$frontend_backend;
  }
}
